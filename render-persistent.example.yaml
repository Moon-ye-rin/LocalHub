# SQLite 변경사항을 재배포 후에도 유지해야 할 때 사용하는 유료 디스크 예시입니다.
# Render 서비스 생성 전에 요금과 팀 예산을 확인하세요.
services:
  - type: web
    name: localhub-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: localhub-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/localhub.db
      - key: SEED_DATA
        value: true
      - key: USE_OPENAI
        value: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
